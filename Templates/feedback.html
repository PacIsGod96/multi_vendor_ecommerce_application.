{% extends "template.html" %}

{% block title %}Product Feedback{% endblock %}

{% block content %}
<div class="review-section">
    <h2>Customer Feedback</h2>

    <div class="reviews-list">  
        {% for r in reviews %}  
            <div class="review-card">  
                <p><strong>{{ r.username }}</strong> <span class="review-rating">{{ "👕" * r.rating }}</span></p>  
                <p>{{ r.content }}</p>  
            </div>  
        {% endfor %}  
    </div>  

    <form action="{{ url_for('send_review_complaint') }}" method="POST" class="professional-form">  
        
        <div class="form-group">
            <label for="category">Subject:</label>  
            <select name="category" id="category" class="styled-select" onchange="toggleRatingSection()">  
                <option value="Review">Product Review</option>  
                <option value="Complaint">Complaint</option>  
                <option value="Refund">Refund Request</option>  
                <option value="Warranty">Warranty Claim</option>  
            </select> 
        </div>

        <div class="rating-area" style="display: none;">
            <div class="rating-container">  
                <label>Rating:</label>  
                <div class="shirt-rating">  
                    <input type="radio" name="rating" value="5" id="s5" onclick="showExplanation(5)"><label for="s5">👕</label>
                    <input type="radio" name="rating" value="4" id="s4" onclick="showExplanation(4)"><label for="s4">👕</label>
                    <input type="radio" name="rating" value="3" id="s3" onclick="showExplanation(3)"><label for="s3">👕</label>
                    <input type="radio" name="rating" value="2" id="s2" onclick="showExplanation(2)"><label for="s2">👕</label>
                    <input type="radio" name="rating" value="1" id="s1" onclick="showExplanation(1)" required><label for="s1">👕</label>
                </div>  
            </div>

            <div id="extra-feedback" class="form-group" style="display: none;">
                <label id="explanation-label" for="review_text">Explain your rating:</label>  
                <textarea name="review_text" id="review_text" placeholder="Type here..."></textarea>  
            </div>
        </div>

        <div class="form-footer">  
            <input type="submit" value="Submit Feedback" class="submit-btn">  
        </div>  
    </form>
</div>
{% endblock %}
